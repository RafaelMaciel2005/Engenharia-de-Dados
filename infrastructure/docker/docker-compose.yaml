x-airflow-common:
  &airflow-common    
  build:
      context: ./airflow # Certifique-se que o Dockerfile está aqui
  env_file:
    - .env    
  # Pulls the image name from the .env file
  image: ${AIRFLOW_IMAGE_NAME}

  user: ${AIRFLOW_UID} # Default of Airflow # Importante para permissões de escrita em Linux
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - ${PROJECT_ROOT}/pipelines/orchestration/airflow_dags:/opt/airflow/dags
    - ${PROJECT_ROOT}/volumes/logs/airflow:/opt/airflow/logs #
    - ${PROJECT_ROOT}/infrastructure/docker/airflow/plugins:/opt/airflow/plugins  
  environment:
    &airflow-common-env
    AIRFLOW_UID: ${AIRFLOW_UID}
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
    # Add this line below:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_USER}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
  networks:          
    - airflow-network   
  

services:
  postgres:
    image: postgres:15.10-alpine    
    ports:
      - "5433:5432"
    networks:          
      - airflow-network
    environment:
      - POSTGRES_USER=${POSTGRES_USER}  
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}  
    env_file:
      - .env
    volumes:                                      
      - ${PROJECT_ROOT}/volumes/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5     

  redis:
    image: redis:7-alpine
    networks:         
      - airflow-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common    
    user: "0:0"    
    # 'db migrate' is much safer and more reliable than 'version' for initialization
    command: >      
      bash -c "chown -R 50000:0 /opt/airflow/logs /opt/airflow/dags /opt/airflow/plugins && airflow db migrate"
    # command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD}      
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  airflow-scheduler:
    <<: *airflow-common    
    command: scheduler
    restart: always
    depends_on:
      airflow-init: { condition: service_completed_successfully }

  airflow-worker:
    <<: *airflow-common    
    command: celery worker
    hostname: airflow-worker
    restart: always
    depends_on:
      airflow-init: { condition: service_completed_successfully }

  airflow-webserver:    
    <<: *airflow-common
    command: webserver
    restart: always
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init: { condition: service_completed_successfully }

  minio:   
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1    
    container_name: uel_minio_server
    networks:
      - airflow-network
    env_file:    
    - .env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ${PROJECT_ROOT}/lakehouse:/data 
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:   
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z-cpuv1
    env_file:    
    - .env
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};     
      mc mb --ignore-existing \
      myminio/bronze \
      myminio/silver \
      myminio/gold;
      exit 0;
      "

  spark-master:
    build: ./spark
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    user: root # Switch to administrator mode.
    environment:
      - SPARK_MODE=master
    env_file:
      - .env
    ports:
      - "7077:7077"
      - "8081:8080"
    networks:
      - airflow-network
    volumes:
      - ${PROJECT_ROOT}/pipelines/jobs_spark:/opt/spark/jobs

  spark-worker:
    build: ./spark
    container_name: spark-worker
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    user: root # Switch to administrator mode.
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
    env_file:
      - .env
    networks:
      - airflow-network  
    volumes:
      - ${PROJECT_ROOT}/pipelines/jobs_spark:/opt/spark/jobs  

  dremio:
    image: dremio/dremio-oss:26.0    
    user: root      
    container_name: dremio
    ports:
    - "9047:9047"
    - "31010:31010"
    - "45678:45678"
    networks:
    - airflow-network
    volumes:
    - ${PROJECT_ROOT}/volumes/dremio:/opt/dremio/data   
    #command: chown -R 1000:1000 /opt/dremio/data 
    restart: always

  jupyter:
    build: ./jupyter
    ports:
    - "8888:8888"
    networks:
    - airflow-network
    volumes:
    - ${PROJECT_ROOT}/notebooks:/home/jovyan/work
    environment:
    - JUPYTER_ENABLE_LAB=yes   

networks:
  airflow-network:
    driver: bridge
