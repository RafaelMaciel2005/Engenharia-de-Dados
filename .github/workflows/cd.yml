# CD do projeto: build e publicacao das imagens Docker customizadas (Airflow e Spark).
#
# Como o ambiente de execucao e local (docker-compose), o "deploy" deste projeto
# e a publicacao de imagens versionadas no GitHub Container Registry — o artefato
# que um deploy futuro (ex: Kubernetes, ja reservado em infrastructure/kubernetes)
# consumiria. Ver docs/ci-cd.md para o racional completo.
#
# Comportamento:
#   - Pull request que toca infrastructure/docker/** -> apenas BUILDA (valida o Dockerfile)
#   - Push na main que toca infrastructure/docker/**  -> builda e PUBLICA no GHCR
name: CD - Imagens Docker

on:
  pull_request:
    branches: [main]
    paths: ["infrastructure/docker/**"]
  push:
    branches: [main]
    paths: ["infrastructure/docker/**"]

permissions:
  contents: read
  packages: write

jobs:
  imagem:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - nome: airflow
            contexto: infrastructure/docker/airflow
          - nome: spark
            contexto: infrastructure/docker/spark
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login no GHCR (so quando vai publicar)
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (e push, se main)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.contexto }}
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/rafaelmaciel2005/olist-lakehouse-${{ matrix.nome }}:latest
            ghcr.io/rafaelmaciel2005/olist-lakehouse-${{ matrix.nome }}:${{ github.sha }}
          # Cache de camadas entre execucoes (o download do Spark e pesado)
          cache-from: type=gha,scope=${{ matrix.nome }}
          cache-to: type=gha,mode=max,scope=${{ matrix.nome }}
